name: Excavator
# Auto-bumps manifests using each manifest's checkver/autoupdate rules.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  excavate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ScoopInstaller/GithubActions@main
        with:
          mode: excavate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
